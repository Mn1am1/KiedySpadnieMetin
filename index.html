<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czas respu metinów</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a, #4b2d0c);
            color: #e5d0a6;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
            max-width: 500px;
            width: 100%;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: #e5d0a6;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #4b2d0c;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            margin: 10px 0;
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
        }

        #next-date, #timer, #last-timer {
            color: #e63946; /* Odcień czerwieni */
        }

        .toggle-button {
            margin: 15px 0;
            padding: 10px 15px;
            background: #4b2d0c;
            color: #e5d0a6;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .toggle-button:hover {
            background: #e63946;
        }

        .hidden {
            display: none;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
            font-size: 18px; /* Zwiększony rozmiar tekstu */
            font-weight: bold; /* Pogrubiony tekst */
            color: #e5d0a6;
        }

        .image-frame {
            margin-top: 20px;
            border: 2px solid #e5d0a6;
            padding: 10px;
            border-radius: 10px;
            background: #1a1a1a;
            display: none; /* Ukryj ramkę na obraz */
        }

        .image-frame img {
            max-width: 100%;
            border-radius: 10px;
        }

        .radio-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .radio-buttons label {
            display: block;
            padding: 10px;
            background: #4b2d0c;
            color: #e5d0a6;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }

        .radio-buttons input[type="radio"] {
            display: none;
        }

        .radio-buttons input[type="radio"]:checked + label {
            background: #e63946;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(229, 208, 166, 0.7);
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const startDate = new Date("2025-01-02T10:01:00");
            const interval = (1 * 60 * 60 * 1000) + (2 * 60 * 1000) + (30 * 1000);

            let nextDate = calculateNextDate();
            let lastDate = calculateLastDate();

            function calculateNextDate() {
                const now = new Date();
                let next = new Date(startDate);
                while (next <= now) {
                    next = new Date(next.getTime() + interval);
                }
                return next;
            }

            function calculateLastDate() {
                const now = new Date();
                let last = new Date(startDate);
                while (last.getTime() + interval <= now.getTime()) {
                    last = new Date(last.getTime() + interval);
                }
                return last;
            }

            function getNextDates(count) {
                const dates = [];
                let next = new Date(nextDate);
                for (let i = 0; i < count; i++) {
                    dates.push(new Date(next));
                    next = new Date(next.getTime() + interval);
                }
                return dates;
            }

            function updateTimer() {
                const now = new Date();
                const diffToNext = nextDate - now;
                const diffFromLast = now - lastDate;

                if (diffToNext <= 0) {
                    lastDate = nextDate;
                    nextDate = calculateNextDate();
                }

                const hoursToNext = Math.floor(diffToNext / (1000 * 60 * 60));
                const minutesToNext = Math.floor((diffToNext % (1000 * 60 * 60)) / (1000 * 60));
                const secondsToNext = Math.floor((diffToNext % (1000 * 60)) / 1000);

                const timeToNextString = hoursToNext > 0 
                    ? `${hoursToNext} godzin, ${minutesToNext} minut ${secondsToNext} sekund` 
                    : `${minutesToNext} minut, ${secondsToNext} sekund`;

                const hoursFromLast = Math.floor(diffFromLast / (1000 * 60 * 60));
                const minutesFromLast = Math.floor((diffFromLast % (1000 * 60 * 60)) / (1000 * 60));
                const secondsFromLast = Math.floor((diffFromLast % (1000 * 60)) / 1000);

                const timeFromLastString = hoursFromLast > 0 
                    ? `${hoursFromLast} godzin, ${minutesFromLast} minut, ${secondsFromLast} sekund` 
                    : `${minutesFromLast} minut, ${secondsFromLast} sekund`;

                document.getElementById('next-date').textContent = nextDate.toLocaleTimeString('pl-PL');
                document.getElementById('timer').textContent = timeToNextString;
                document.getElementById('last-timer').textContent = timeFromLastString;
            }

            function toggleList() {
                const listContainer = document.getElementById('next-dates-list');
                if (listContainer.classList.contains('hidden')) {
                    const nextDates = getNextDates(12); // Fetch next 5 dates
                    const list = document.createElement('ul');

                    nextDates.forEach(date => {
                        const listItem = document.createElement('li');
                        listItem.textContent = date.toLocaleTimeString('pl-PL');
                        list.appendChild(listItem);
                    });

                    listContainer.innerHTML = '';
                    listContainer.appendChild(list);
                    listContainer.classList.remove('hidden');
                } else {
                    listContainer.classList.add('hidden');
                }
            }

            function updateImage() {
                const selectedOption = document.querySelector('input[name="image-options"]:checked');
                const imageFrame = document.getElementById('image-frame');

                if (selectedOption) {
                    const imagePath = selectedOption.dataset.image;
                    imageFrame.innerHTML = `<img src="${imagePath}" alt="Selected Image">`;
                    imageFrame.style.display = 'block';
                } else {
                    imageFrame.style.display = 'none';
                }
            }

			function init() {
				updateTimer();
				setInterval(updateTimer, 1000);

				const toggleButton = document.getElementById('toggle-button');
				toggleButton.addEventListener('click', toggleList);

				const radioButtons = document.querySelectorAll('input[name="image-options"]');
				let lastChecked = null;

				radioButtons.forEach(button => {
					button.addEventListener('click', function () {
						if (this === lastChecked) {
							this.checked = false;
							lastChecked = null;
						} else {
							lastChecked = this;
						}
						updateImage();
					});
				});

				const imageFrame = document.getElementById('image-frame');
				imageFrame.style.display = 'none';
			}

            init();
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">DZ</div>
        <h1>Kiedy spadną metiny</h1>
        <p><h2>Najbliższy resp: <strong><span id="next-date">Ładowanie...</span></strong></h2></p>
        <p class="timer">Pozostało: <span id="timer">Ładowanie...</span></p>
        <p class="timer">Ostatni resp: <span id="last-timer">Ładowanie...</span></p>
        <button id="toggle-button" class="toggle-button">Kolejne 12 respów</button>
        <div id="next-dates-list" class="hidden"></div>

        <div>
            <h3>Mapy metinów</h3>
            <div class="radio-buttons">
                <input type="radio" id="option1" name="image-options" data-image="img/m1_chunjo.jpg">
                <label for="option1">Chunjo M1</label>
                <input type="radio" id="option2" name="image-options" data-image="img/m1_jino.jpg">
                <label for="option2">Jino M1</label>
                <input type="radio" id="option3" name="image-options" data-image="img/m1_shinsoo.jpg">
                <label for="option3">Shinsoo M1</label>
				<input type="radio" id="option4" name="image-options" data-image="img/m2_chunjo.jpg">
                <label for="option4">Chunjo M2</label>
                <input type="radio" id="option5" name="image-options" data-image="img/m2_jino.jpg">
                <label for="option5">Jino M2</label>
                <input type="radio" id="option6" name="image-options" data-image="img/m2_shinsoo.jpg">
                <label for="option6">Shinsoo M2</label>
				<input type="radio" id="option7" name="image-options" data-image="img/desert.jpg">
                <label for="option7">Pustynia</label>
				<input type="radio" id="option8" name="image-options" data-image="img/fireland.jpg">
                <label for="option8">Ognista Ziemia</label>
				<input type="radio" id="option9" name="image-options" data-image="img/green_forest.jpg">
                <label for="option9">Zielony Las</label>
				<input type="radio" id="option10" name="image-options" data-image="img/red_forest.jpg">
                <label for="option10">Czerw. Las</label>
            </div>
        </div>

        <div id="image-frame" class="image-frame">
            <p>Wybierz opcję, aby zobaczyć obraz.</p>
        </div>

        <footer>Autor: <strong>Mniami</strong></footer>
    </div>
</body>
</html>
